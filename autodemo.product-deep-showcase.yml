version: "1"

meta:
  title: "NEW-AI-EDU 产品详解 Demo"
  description: "覆盖学生、家长、教师与管理端多页面链路的深度展示版"
  resolution: { width: 1440, height: 900 }
  fps: 30
  output: "./output/new-ai-edu-product-deep-showcase.mp4"

target:
  url: "http://127.0.0.1:3000"
  startCommand: "corepack pnpm dev"
  startTimeout: 60000
  readyWhen: "url:http://127.0.0.1:3000/api/health"

voiceover:
  provider: "say"
  config:
    voice: "Tingting"
    rate: 132

scenes:
  - id: "intro"
    type: "title"
    title: "NEW-AI-EDU 产品详解 Demo"
    subtitle: "从角色首页扩展到关键业务页面"
    narration: "这一版不再只是总览，而是沿着学生、家长、教师和管理端的真实工作链路，连续进入更多关键页面，把产品细节尽量一次性展示完整。"

  - id: "student-title"
    type: "title"
    title: "学生端详解"
    subtitle: "从首页主路径扩展到作业、模块、成长与知识图谱"
    narration: "先看学生端详解。除了首页和互动课堂，我们还会继续进入作业中心、课程模块、成长档案和知识图谱，把学生学习闭环讲完整。"

  - id: "student-dashboard"
    type: "interaction"
    narration: "首先切到学生身份。首页先聚焦今天最值得开始的动作，再把互动课堂入口、任务队列和成长闭环按执行顺序组织起来，让学生更快开始当天任务。"
    steps:
      - action: "request"
        method: "POST"
        path: "/api/auth/login"
        body:
          email: "student@demo.com"
          password: "Student123"
          role: "student"
        expectedStatus: 200
      - action: "navigate"
        url: "/student"
      - action: "wait"
        selector: "#student-action-center"
      - action: "highlight"
        selector: "#student-action-center"
        duration: 1800
      - action: "highlight"
        selector: "#student-self-study-entry"
        duration: 1700
      - action: "scroll"
        selector: "#student-task-queue"
        smooth: true
      - action: "highlight"
        selector: "#student-task-queue"
        duration: 1700
      - action: "click"
        selector: "#student-task-queue > summary"
      - action: "pause"
        duration: 1000
      - action: "scroll"
        selector: "#student-growth-center"
        smooth: true
      - action: "click"
        selector: "#student-growth-center > summary"
      - action: "highlight"
        selector: "#student-growth-center"
        duration: 1700

  - id: "student-classroom"
    type: "interaction"
    narration: "学生自主互动课堂负责把预习、巩固、兴趣探索和课堂回看收在一起。学生只要输入主题，就能快速发起一节连续的陪学课堂。"
    steps:
      - action: "navigate"
        url: "/student/interactive-classroom"
      - action: "wait"
        selector: "[data-testid='student-self-study-topic']"
      - action: "type"
        selector: "[data-testid='student-self-study-topic']"
        value: "圆柱的表面积"
        typeDelay: 75
      - action: "pause"
        duration: 900
      - action: "highlight"
        selector: "[data-testid='student-self-study-topic']"
        duration: 1700
      - action: "highlight"
        selector: "[data-testid='student-self-study-launch']"
        duration: 1800
      - action: "pause"
        duration: 1300

  - id: "student-assignments"
    type: "interaction"
    narration: "作业中心继续承接互动课堂之后的消化闭环。这里既能看优先级和进度，也能把互动课堂、错题复练和后续模式继续串起来。"
    steps:
      - action: "navigate"
        url: "/student/assignments"
      - action: "wait"
        selector: "h2:has-text('作业中心')"
      - action: "highlight"
        selector: "h2:has-text('作业中心')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('互动课堂作业闭环')"
        duration: 1700
      - action: "scroll"
        selector: "div.section-title:has-text('作业列表')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('作业列表')"
        duration: 1800

  - id: "student-modules"
    type: "interaction"
    narration: "课程模块页从班级和单元视角整理学习内容、任务进度和互动课堂联动，帮助学生把单元学习和日常任务更自然地接到一起。"
    steps:
      - action: "navigate"
        url: "/student/modules"
      - action: "wait"
        selector: "h2:has-text('课程模块')"
      - action: "highlight"
        selector: "h2:has-text('课程模块')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('学习摘要')"
        duration: 1600
      - action: "scroll"
        selector: "div.section-title:has-text('互动课堂联动预习')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('互动课堂联动预习')"
        duration: 1800

  - id: "student-growth"
    type: "interaction"
    narration: "成长档案页把互动课堂学习资产、学习路径总览、学科掌握度和薄弱知识点收口在一起，让学生能看到自己正在如何持续进步。"
    steps:
      - action: "navigate"
        url: "/student/growth"
      - action: "wait"
        selector: "h2:has-text('成长档案')"
      - action: "highlight"
        selector: "h2:has-text('成长档案')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('互动课堂学习资产')"
        duration: 1700
      - action: "scroll"
        selector: "div.section-title:has-text('学习路径总览')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('学习路径总览')"
        duration: 1600
      - action: "scroll"
        selector: "div.section-title:has-text('薄弱知识点')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('薄弱知识点')"
        duration: 1800

  - id: "student-knowledge-map"
    type: "interaction"
    narration: "知识图谱页则把知识点关系与掌握度做成可视化地图。学生不只是看分数，而是能看到自己在哪些知识点已经稳住，哪些地方还需要继续补强。"
    steps:
      - action: "navigate"
        url: "/student/knowledge-map"
      - action: "wait"
        selector: "h2:has-text('知识图谱')"
      - action: "highlight"
        selector: "h2:has-text('知识图谱')"
        duration: 1800
      - action: "highlight"
        selector: "text=如何使用知识图谱"
        duration: 1700
      - action: "pause"
        duration: 1500

  - id: "parent-title"
    type: "title"
    title: "家长端详解"
    subtitle: "把看报告变成今晚先做什么"
    narration: "家长端虽然页面不多，但逻辑很清晰。它不是简单地堆报表，而是把今晚要先做什么、订正、作业、周报、薄弱点和低压力复盘按家长的真实跟进顺序组织起来。"

  - id: "parent-dashboard"
    type: "interaction"
    narration: "切到家长身份后，首页先锁定今晚第一步，再把需要跟进的任务、补充判断和低压力复盘逐段展开，帮助家长先行动，再看全貌。"
    steps:
      - action: "request"
        method: "POST"
        path: "/api/auth/logout"
        expectedStatus: 200
      - action: "request"
        method: "POST"
        path: "/api/auth/login"
        body:
          email: "parent@demo.com"
          password: "Parent123"
          role: "parent"
        expectedStatus: 200
      - action: "navigate"
        url: "/parent"
      - action: "wait"
        selector: "#parent-action-center"
      - action: "highlight"
        selector: "#parent-action-center"
        duration: 1700
      - action: "scroll"
        selector: "#parent-corrections"
        smooth: true
      - action: "highlight"
        selector: "#parent-corrections"
        duration: 1500
      - action: "highlight"
        selector: "#parent-assignments"
        duration: 1500
      - action: "scroll"
        selector: "#parent-weekly-report"
        smooth: true
      - action: "highlight"
        selector: "#parent-weekly-report"
        duration: 1600
      - action: "highlight"
        selector: "#parent-weak-points"
        duration: 1600
      - action: "scroll"
        selector: "#parent-favorites"
        smooth: true
      - action: "highlight"
        selector: "#parent-favorites"
        duration: 1700

  - id: "teacher-title"
    type: "title"
    title: "教师端详解"
    subtitle: "从教学执行扩展到备课、实时课堂、成绩册与项目式学习"
    narration: "下面进入教师端详解。除了首页、分析页和 AI 工具页，我们还会继续进入 AI 备课助手、课堂实时仪表盘、成绩册和项目式学习，把教师的日常工作链路讲完整。"

  - id: "teacher-dashboard"
    type: "interaction"
    narration: "教师首页先把今日第一步、作业发布和真实班级执行入口放在前面，再把教学盘面、风险上下文和资产台账折叠起来，帮助老师优先处理真正会卡住教学的动作。"
    steps:
      - action: "request"
        method: "POST"
        path: "/api/auth/logout"
        expectedStatus: 200
      - action: "request"
        method: "POST"
        path: "/api/auth/login"
        body:
          email: "teacher@demo.com"
          password: "Teacher123"
          role: "teacher"
        expectedStatus: 200
      - action: "navigate"
        url: "/teacher"
      - action: "wait"
        selector: "#teacher-action-center"
      - action: "highlight"
        selector: "#teacher-action-center"
        duration: 1600
      - action: "scroll"
        selector: "#teacher-compose-assignment"
        smooth: true
      - action: "highlight"
        selector: "#teacher-compose-assignment"
        duration: 1700
      - action: "click"
        selector: "#teacher-context-layers > summary"
      - action: "pause"
        duration: 1000
      - action: "highlight"
        selector: "#teacher-context-layers"
        duration: 1700
      - action: "click"
        selector: "#teacher-assets-center > summary"
      - action: "pause"
        duration: 1000
      - action: "highlight"
        selector: "#teacher-class-list"
        duration: 1600
      - action: "highlight"
        selector: "#teacher-assets-center"
        duration: 1500

  - id: "teacher-analysis"
    type: "interaction"
    narration: "教师分析页把告警、因果分析和热力图放在一起，让老师从教学执行自然过渡到班级判断，而不是在多个系统之间来回切换。"
    steps:
      - action: "navigate"
        url: "/teacher/analysis"
      - action: "wait"
        selector: "#analysis-alerts"
      - action: "highlight"
        selector: "#analysis-alerts"
        duration: 1600
      - action: "highlight"
        selector: "#analysis-causality"
        duration: 1600
      - action: "scroll"
        selector: "#analysis-heatmap"
        smooth: true
      - action: "highlight"
        selector: "#analysis-heatmap"
        duration: 1800

  - id: "teacher-ai-tools"
    type: "interaction"
    narration: "教师 AI 工具页把课堂面板和发起入口直接放在一起，老师可以不重组上下文，就把 AI 课堂动作、讲评和辅助能力接到教学主线里。"
    steps:
      - action: "navigate"
        url: "/teacher/ai-tools"
      - action: "wait"
        selector: "[data-testid='teacher-ai-tools-classroom-panel']"
      - action: "highlight"
        selector: "[data-testid='teacher-ai-tools-classroom-panel']"
        duration: 1800
      - action: "highlight"
        selector: "[data-testid='teacher-launch-ai-classroom']"
        duration: 1800
      - action: "pause"
        duration: 1200

  - id: "teacher-lesson-planner"
    type: "interaction"
    narration: "AI 备课助手围绕真实班级学情生成错误预测、课堂互动设计、分层作业和课后反思提示，把备课从经验型整理升级为面向班级数据的具体方案。"
    steps:
      - action: "navigate"
        url: "/teacher/lesson-planner"
      - action: "wait"
        selector: "h2:has-text('AI 备课助手')"
      - action: "highlight"
        selector: "h2:has-text('AI 备课助手')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('输入本节课主题')"
        duration: 1600
      - action: "type"
        selector: "input[placeholder='例如：分数加减法中的异分母通分']"
        value: "平行四边形的面积"
        typeDelay: 65
      - action: "pause"
        duration: 900
      - action: "highlight"
        selector: "div.section-title:has-text('如何使用这份方案')"
        duration: 1800

  - id: "teacher-classroom-live"
    type: "interaction"
    narration: "课堂实时仪表盘负责把会话发起和当前课堂状态收在一起。老师先从这里发起课堂练习，进入真实课堂后，实时概览、最快完成和需要关注学生就会继续补齐。"
    steps:
      - action: "navigate"
        url: "/teacher/classroom-live"
      - action: "wait"
        selector: "h2:has-text('课堂实时仪表盘')"
      - action: "highlight"
        selector: "h2:has-text('课堂实时仪表盘')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('发起课堂练习')"
        duration: 1600
      - action: "highlight"
        selector: "div.section-title:has-text('当前会话')"
        duration: 1600
      - action: "pause"
        duration: 1400

  - id: "teacher-gradebook"
    type: "interaction"
    narration: "成绩册把班级与视图筛选、收口概览、成绩趋势、成绩分布和学生明细放在一条执行闭环上，让老师先收口问题，再回看整体走势。"
    steps:
      - action: "navigate"
        url: "/teacher/gradebook"
      - action: "wait"
        selector: "h2:has-text('成绩册')"
      - action: "highlight"
        selector: "h2:has-text('成绩册')"
        duration: 1500
      - action: "highlight"
        selector: "#gradebook-summary"
        duration: 1600
      - action: "scroll"
        selector: "#gradebook-trend"
        smooth: true
      - action: "highlight"
        selector: "#gradebook-trend"
        duration: 1600
      - action: "highlight"
        selector: "#gradebook-distribution"
        duration: 1600
      - action: "scroll"
        selector: "#gradebook-table"
        smooth: true
      - action: "highlight"
        selector: "#gradebook-table"
        duration: 1800

  - id: "teacher-projects"
    type: "interaction"
    narration: "项目式学习页则把跨学科项目骨架生成、任务分阶段提交和展示项目管理放在一起，让老师可以把更综合的学习任务持续经营起来。"
    steps:
      - action: "navigate"
        url: "/teacher/projects"
      - action: "wait"
        selector: "h2:has-text('项目式学习')"
      - action: "highlight"
        selector: "h2:has-text('项目式学习')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('创建项目')"
        duration: 1700
      - action: "type"
        selector: "input[placeholder='例如：设计一座节能校园']"
        value: "校园气象站"
        typeDelay: 65
      - action: "pause"
        duration: 1000

  - id: "admin-title"
    type: "title"
    title: "管理端详解"
    subtitle: "从总控台扩展到模型、发布、题库、知识点、工单、日志与资料库"
    narration: "最后看管理端详解。除了总控台、模型路由和上线准备，我们还会继续进入题库管理、知识点管理、知识点树、恢复工单、审计日志和资料库，把平台治理链路讲完整。"

  - id: "admin-overview"
    type: "interaction"
    narration: "管理员总控台把运营、资料、题库、AI 模型、可观测性和发布入口收成一张总地图，方便从一个地方进入不同治理模块。"
    steps:
      - action: "request"
        method: "POST"
        path: "/api/auth/logout"
        expectedStatus: 200
      - action: "request"
        method: "POST"
        path: "/api/auth/login"
        body:
          email: "admin@demo.com"
          password: "Admin123"
          role: "admin"
        expectedStatus: 200
      - action: "navigate"
        url: "/admin"
      - action: "wait"
        selector: "h2:has-text('管理控制台')"
      - action: "highlight"
        selector: "h2:has-text('管理控制台')"
        duration: 1500
      - action: "highlight"
        selector: "text=打开模型中心"
        duration: 1500
      - action: "highlight"
        selector: "text=打开上线准备中心"
        duration: 1500
      - action: "scroll"
        selector: "text=接口可观测性"
        smooth: true
      - action: "highlight"
        selector: "text=接口可观测性"
        duration: 1500
      - action: "highlight"
        selector: "text=观测告警"
        duration: 1600

  - id: "admin-ai-models"
    type: "interaction"
    narration: "AI 模型路由中心把后台托管密钥、任务策略、离线评测、质量校准、评测门禁和调用指标收在一起，让模型治理不再散落到多个页面。"
    steps:
      - action: "navigate"
        url: "/admin/ai-models"
      - action: "wait"
        selector: "h2:has-text('AI 模型路由中心')"
      - action: "highlight"
        selector: "h2:has-text('AI 模型路由中心')"
        duration: 1500
      - action: "scroll"
        selector: "div.section-title:has-text('任务策略')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('任务策略')"
        duration: 1600
      - action: "scroll"
        selector: "div.section-title:has-text('离线评测与质量校准')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('离线评测与质量校准')"
        duration: 1700
      - action: "scroll"
        selector: "div.section-title:has-text('AI 调用指标')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('AI 调用指标')"
        duration: 1700

  - id: "admin-launch-readiness"
    type: "interaction"
    narration: "上线准备中心把当前结论、阻断项、预警项、逐项检查和运行时依赖明细统一压成一份发布报告，帮助团队在上线前快速判断环境状态。"
    steps:
      - action: "navigate"
        url: "/admin/launch-readiness"
      - action: "wait"
        selector: "h2:has-text('上线准备中心')"
      - action: "highlight"
        selector: "div.section-title:has-text('当前结论')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('上线前优先处理')"
        duration: 1500
      - action: "highlight"
        selector: "div.section-title:has-text('建议继续收敛')"
        duration: 1500
      - action: "scroll"
        selector: "div.section-title:has-text('逐项检查')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('逐项检查')"
        duration: 1700
      - action: "scroll"
        selector: "div.section-title:has-text('运行时依赖明细')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('运行时依赖明细')"
        duration: 1700

  - id: "admin-questions"
    type: "interaction"
    narration: "题库管理页把题目列表、批量导入、AI 生成和手动新增放在一处，便于题库扩充、质量治理和人工维护同时进行。"
    steps:
      - action: "navigate"
        url: "/admin/questions"
      - action: "wait"
        selector: "h2:has-text('题库管理')"
      - action: "highlight"
        selector: "h2:has-text('题库管理')"
        duration: 1500
      - action: "highlight"
        selector: "text=列表与分类"
        duration: 1400
      - action: "click"
        selector: "text=导入/生成/新增"
      - action: "pause"
        duration: 900
      - action: "highlight"
        selector: "div.section-title:has-text('批量导入题库（CSV）')"
        duration: 1600
      - action: "scroll"
        selector: "div.section-title:has-text('AI 生成题目')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('AI 生成题目')"
        duration: 1700
      - action: "scroll"
        selector: "div.section-title:has-text('新增题目')"
        smooth: true
      - action: "highlight"
        selector: "div.section-title:has-text('新增题目')"
        duration: 1700

  - id: "admin-knowledge-points"
    type: "interaction"
    narration: "知识点管理页则把批量生成、整本书树形生成、AI 生成知识点和手动新增一起收拢，让知识体系建设有了稳定的运营后台。"
    steps:
      - action: "navigate"
