services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    ports:
      - "54329:5432"
    environment:
      POSTGRES_DB: hangke_ai_edu_local
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d hangke_ai_edu_local"]
      interval: 5s
      timeout: 5s
      retries: 20
    volumes:
      - hangke_ai_edu_postgres:/var/lib/postgresql/data

volumes:
  hangke_ai_edu_postgres:
